spring:
  application:
    name: fx-service

  datasource:
    url: jdbc:h2:mem:fxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

fx:
  provider:
    base-url: https://open.er-api.com/v6/latest
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
  rates:
    cache-ttl-seconds: 300